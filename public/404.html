<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>React App</title>
    <script>
      const pathSegmentsToKeep = 0;
      const loc = window.location;
      const redirectPath = `${loc.protocol}//${loc.hostname}${loc.port ? `:${loc.port}` : ''}${loc.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/')}/?/${loc.pathname
        .slice(1)
        .split('/')
        .slice(pathSegmentsToKeep)
        .join('/')
        .replace(/&/g, '~and~')}${loc.search ? `&${loc.search.slice(1).replace(/&/g, '~and~')}` : ''}${loc.hash}`;

      loc.replace(redirectPath);
    </script>
  </head>
  <body></body>
</html>
